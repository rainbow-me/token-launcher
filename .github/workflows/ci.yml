name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Enable Corepack
        run: corepack enable

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: yarn
          cache-dependency-path: yarn.lock

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Install dependencies
        run: yarn install --immutable

      - name: Lint
        run: yarn lint

      - name: Build
        run: yarn build

      - name: Test
        run: yarn test
        env:
          CI: true
          RPC_URL: ${{ secrets.RPC_URL }}
          LAUNCHER_CODE: ${{ secrets.LAUNCHER_CODE }}
          LAUNCHER_PLATFORM: ${{ secrets.LAUNCHER_PLATFORM }}
          LAUNCHER_FEE_ADDRESS: ${{ secrets.LAUNCHER_FEE_ADDRESS }}
